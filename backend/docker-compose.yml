services:
  mysql:
    image: mysql:8.0
    container_name: garagepro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: garagepro
      MYSQL_USER: garagepro
      MYSQL_PASSWORD: garagepro
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=America/Sao_Paulo
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "garagepro", "-pgaragepro"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
